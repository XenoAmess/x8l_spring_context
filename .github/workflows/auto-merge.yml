name: Dependabot auto-merge

on:
  pull_request:

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'app/dependabot'
    steps:
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check if auto-merge applicable
        id: check
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$UPDATE_TYPE" == "version-update:semver-patch" ]] || \
             [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]] || \
             { [[ "$UPDATE_TYPE" == "version-update:semver-major" ]] && [[ "$HEAD_REF" == dependabot/github_actions/* ]]; }; then
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve dependabot PR
        if: steps.check.outputs.should_merge == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.MYTOKEN }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge
        if: steps.check.outputs.should_merge == 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.MYTOKEN }}
        run: gh pr merge --auto --rebase "$PR_URL"
